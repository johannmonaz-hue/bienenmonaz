<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienenmonaz | Galerie</title>
  <meta
    name="description"
    content="Galerie der Imkerei Bienenmonaz mit Bildern aus Bienenstand, Honigernte, Waben und Honiggl&auml;sern."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="gallery">
  <div class="site-bg"></div>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Bienenmonaz Startseite">
        <span class="brand-mark">BM</span>
        <span class="brand-copy">
          <strong>Bienenmonaz</strong>
          <span>Imkerei & Honig aus Erding</span>
        </span>
      </a>

      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        Men&uuml;
      </button>

      <nav class="site-nav" id="site-nav">
        <a href="index.html">Start</a>
        <a class="is-active" href="galerie.html">Galerie</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>
    </header>

    <main class="main-stack">
      <div class="gallery-heading">
        <p class="eyebrow">Galerie</p>
        <h1>Einblicke in das Bienenjahr</h1>
      </div>

      <section class="gallery-grid">
        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/honigernte-1.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/honigernte-1.jpg" alt="Honigernte und frische Waben im Arbeitsraum" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/hero-honig.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/hero-honig.jpg" alt="Honig, Kerzen und Produktwelt" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/bienen-wabe-1.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/bienen-wabe-1.jpg" alt="Bienen auf geöffneten Waben" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/bienen-wabe-2.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/bienen-wabe-2.jpg" alt="Bienen auf einer sonnigen Naturbau-Wabe" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/bienen-koenigin.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/bienen-koenigin.jpg" alt="Markierte Königin im Volk" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/waben-im-glas.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/waben-im-glas.jpg" alt="Wabenhonig in vorbereiteten Gläsern" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/honig-glaeser-1.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/honig-glaeser-1.jpg" alt="Honiggläser mit verschiedenen Sorten" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/honig-glaeser-2.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/honig-glaeser-2.jpg" alt="Frisch abgefuellte Honiggläser im Licht" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/pollen.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/pollen.jpg" alt="Pollen in intensiven Naturfarben" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/krokus-bienen.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/krokus-bienen.jpg" alt="Bienen an Krokusblüten" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/bienenstand.jpg" data-caption="">

          </button>
        </figure>
        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/Bienen_Wildbau.jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/Bienen_Wildbau.jpg" alt="Naturbau-Wabe mit Bienen im Freien" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/Frühjahr_Blütenhonig.JPG" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/Frühjahr_Blütenhonig.JPG" alt="Frühjahrs-Blütenhonig" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/Frühjahrhonig.jpg" data-caption="">

          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/Honig2023.JPG" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/Honig2023.JPG" alt="Honigernte 2023" loading="lazy">
          </button>
        </figure>

        <figure class="gallery-card">
          <button class="gallery-button" type="button" data-image="assets/images/Standort_Iztling (1).jpg" data-caption="">
            <span class="gallery-overlay"></span>
            <img src="assets/images/Standort_Iztling (1).jpg" alt="Bienenstand Iztling" loading="lazy">
          </button>
        </figure>
      </section>
    </main>

    <footer class="site-footer surface">
      <p>Bienenmonaz | Imkerei und Honig aus Erding</p>
      <nav>
        <a href="index.html">Start</a>
        <a href="galerie.html">Galerie</a>
        <a href="kontakt.html">Kontakt</a>
      </nav>
    </footer>
  </div>

  <div class="lightbox" hidden>
    <button class="lightbox-close" type="button" aria-label="Grossansicht schliessen">Schliessen</button>
    <figure class="lightbox-figure">
      <img class="lightbox-image" src="" alt="">
      <figcaption class="lightbox-caption"></figcaption>
    </figure>
  </div>

  <script src="script.js"></script>

</html>
